# fly.toml — 修改 app 為你的 app 名稱
app = "your-app-name"
primary_region = "nrt"   # Tokyo，離台灣最近

[build]
  dockerfile = "Dockerfile"

[env]
  FLASK_ENV = "production"
  DB_PATH    = "/data/scheduling.db"
  PORT       = "8080"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "256mb"

# 持久化磁碟 — SQLite 存這裡
[[mounts]]
  source      = "scheduling_data"
  destination = "/data"
  initial_size = "1gb"
